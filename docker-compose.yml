services:
  llama:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        LLAMACPP_ROCM_ARCH: gfx1030
    container_name: llama-qwen35
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    ipc: host
    shm_size: "16gb"
    environment:
      HSA_OVERRIDE_GFX_VERSION: "10.3.0"
      HIP_VISIBLE_DEVICES: "0"
    volumes:
      - ./models:/data
    ports:
      - "11534:8080"
    entrypoint: ["/workspace/llama.cpp/build/bin/llama-server"]
    command:
      [
        "-m", "/data/qwen35_35b_3k.gguf",
        "--mmproj", "/data/mmproj35b.gguf",
        "--host", "0.0.0.0",
        "--port", "8080",
        "--fit", "on",
        "-np", "4",
        "-c", "131072",
        "-b", "128",
        "-ub", "32",
        "-ctk", "q8_0",
        "-ctv", "q8_0",
        "-fa", "on",
        "--chat-template-kwargs", "{\"enable_thinking\": false}"
      ]
    restart: unless-stopped
